<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>2026mabil Scouting Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22253a;--border:#2a2d3e;
  --text:#e4e6eb;--muted:#8b8fa8;--muted2:#9da0b3;
  --blue:#4f8ef7;--orange:#f97316;--green:#22d3a1;--purple:#a855f7;--red:#f43f5e;
  --yellow:#facc15;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── TABS ── */
.tabs-header{display:flex;gap:0;border-bottom:2px solid var(--border);padding:0 24px;background:var(--surface)}
.tab-btn{padding:14px 28px;font-size:.95rem;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none;padding:24px}
.tab-content.active{display:block}

/* ── TEAM BROWSER ── */
.browser-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.team-list-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:16px}
.team-list-search{padding:12px;border-bottom:1px solid var(--border)}
.team-list-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.88rem;outline:none}
.team-list-search input:focus{border-color:var(--blue)}
.team-list{max-height:calc(100vh - 160px);overflow-y:auto}
.team-list-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.9rem;border-left:3px solid transparent;transition:background .15s,border-color .15s}
.team-list-item:hover{background:var(--surface2)}
.team-list-item.selected{background:var(--surface2);border-left-color:var(--blue);color:var(--blue)}
.team-list-item .t-name{font-weight:600}
.team-list-item .t-avg{font-size:.78rem;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:10px}
.team-list-item.selected .t-avg{background:rgba(79,142,247,.15);color:var(--blue)}

/* tier badges */
.tier{font-size:.65rem;font-weight:700;letter-spacing:.04em;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.tier-elite{background:rgba(250,204,21,.15);color:var(--yellow)}
.tier-strong{background:rgba(34,211,161,.15);color:var(--green)}
.tier-mid{background:rgba(79,142,247,.15);color:var(--blue)}
.tier-low{background:rgba(168,85,247,.15);color:var(--purple)}
.tier-struggle{background:rgba(244,63,94,.15);color:var(--red)}

/* ── TEAM DETAIL ── */
.team-detail{display:flex;flex-direction:column;gap:20px}
.detail-header{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.detail-header h2{font-size:2rem;font-weight:800}
.trend-badge{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:600}
.trend-up{background:rgba(34,211,161,.15);color:var(--green)}
.trend-down{background:rgba(244,63,94,.15);color:var(--red)}
.trend-stable{background:rgba(139,143,168,.15);color:var(--muted)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-card .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-card .value{font-size:1.5rem;font-weight:700}
.stat-card .sub{font-size:.75rem;color:var(--muted2);margin-top:2px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.card h3{font-size:.88rem;font-weight:600;color:var(--muted2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
.chart-wrap{position:relative;height:240px}

/* Match table */
.match-table{width:100%;border-collapse:collapse;font-size:.83rem}
.match-table th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:.76rem;text-transform:uppercase;letter-spacing:.04em}
.match-table td{padding:9px 12px;border-bottom:1px solid rgba(42,45,62,.5);vertical-align:top}
.match-table tr:last-child td{border-bottom:none}
.match-table tr:hover td{background:var(--surface2)}
.state-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.state-ok{background:rgba(34,211,161,.12);color:var(--green)}
.state-comms{background:rgba(250,204,21,.12);color:var(--yellow)}
.state-brown{background:rgba(249,115,22,.12);color:var(--orange)}
.state-bad{background:rgba(244,63,94,.12);color:var(--red)}
.state-unk{background:rgba(139,143,168,.12);color:var(--muted)}
.pts-bar-wrap{display:flex;align-items:center;gap:8px}
.pts-bar{height:6px;border-radius:3px;background:var(--blue);min-width:2px;transition:width .3s}
.comment-text{color:var(--muted2);font-style:italic;font-size:.78rem;max-width:320px}
.scout-tag{font-size:.7rem;color:var(--muted);margin-top:2px}

/* rating stars */
.rating{display:flex;gap:2px}
.rating .dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.rating .dot.filled{background:var(--blue)}

/* ── COMPARE TAB ── */
.compare-controls{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px}
.compare-controls h3{font-size:.88rem;font-weight:600;color:var(--muted2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em}
.team-selectors{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.team-selector{display:flex;flex-direction:column;gap:6px}
.team-selector label{font-size:.8rem;color:var(--muted);font-weight:500}
.team-selector select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:.9rem;outline:none;cursor:pointer;min-width:160px}
.team-selector select:focus{border-color:var(--blue)}
.compare-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;align-self:flex-end}
.compare-btn:hover{opacity:.85}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.compare-grid .full{grid-column:1/-1}
.color-swatch{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}

@media(max-width:900px){
  .browser-layout{grid-template-columns:1fr}
  .team-list-panel{position:static}
  .two-col,.compare-grid{grid-template-columns:1fr}
  .compare-grid .full{grid-column:1}
}
</style>
</head>

const ALL_TEAMS = Object.keys(TEAM_DATA).sort((a,b)=>TEAM_DATA[b].avgTotal - TEAM_DATA[a].avgTotal);
const CMP_COLORS = ['#4f8ef7','#f97316','#22d3a1'];

function hexRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getTier(avg){
  if(avg>=70) return {label:'Elite',cls:'tier-elite'};
  if(avg>=40) return {label:'Strong',cls:'tier-strong'};
  if(avg>=20) return {label:'Mid',cls:'tier-mid'};
  if(avg>=5)  return {label:'Low',cls:'tier-low'};
  return {label:'Struggling',cls:'tier-struggle'};
}

function stateClass(s){
  if(s===1) return 'state-ok';
  if(s===2) return 'state-comms';
  if(s===3) return 'state-brown';
  if(s===4) return 'state-bad';
  return 'state-unk';
}

function ratingDots(val, max=4){
  let h='<div class="rating">';
  for(let i=1;i<=max;i++) h+=`<div class="dot${i<=val?' filled':''}"></div>`;
  return h+'</div>';
}

  const el = document.getElementById('teamList');

    if(filter && !t.includes(filter)) return;
    const d=TEAM_DATA[t];
    const tier=getTier(d.avgTotal);
    const div=document.createElement('div');
    div.className='team-list-item'+(window._selectedTeam===t?' selected':'');
    div.dataset.team=t;
    div.onclick=()=>selectTeam(t);
    div.innerHTML=`<span class="t-name">Team ${t}</span><span class="t-avg">${d.avgTotal} avg</span><span class="tier ${tier.cls}">${tier.label}</span>`;
    el.appendChild(div);
  });
}

function filterTeams(){
  buildTeamList(document.getElementById('teamSearch').value.trim());
}

// ── TEAM DETAIL ──────────────────────────────────────────────────
let _detailChart = null;

function selectTeam(team){
  window._selectedTeam = team;
  document.querySelectorAll('.team-list-item').forEach(el=>{
    el.classList.toggle('selected', el.dataset.team===team);
  });
  renderTeamDetail(team);
}

function renderTeamDetail(team){
  const d = TEAM_DATA[team];
  const tier = getTier(d.avgTotal);
  const trendIcon = d.trend==='up'?'↑ Improving':d.trend==='down'?'↓ Declining':'→ Stable';
  const trendCls = d.trend==='up'?'trend-up':d.trend==='down'?'trend-down':'trend-stable';

  const reliabilityPct = Math.round((1 - d.malfunctions/d.matchCount)*100);
  const hasClimb = d.matches.some(m=>m.climbPts>0);

  // Stats cards
  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Avg Pts</div><div class="value">${d.avgTotal}</div><div class="sub">per match</div></div>
      <div class="stat-card"><div class="label">Avg Auto</div><div class="value">${d.avgAuto}</div><div class="sub">pts contribution</div></div>
      <div class="stat-card"><div class="label">Avg Tele</div><div class="value">${d.avgTele}</div><div class="sub">pts contribution</div></div>
      <div class="stat-card"><div class="label">Hub Accuracy</div><div class="value">${d.avgAccuracy>0?d.avgAccuracy+'%':'—'}</div><div class="sub">${d.avgAccuracy>0?'hub fuel':''}</div></div>
      <div class="stat-card"><div class="label">Reliability</div><div class="value">${reliabilityPct}%</div><div class="sub">${d.malfunctions} malfunction${d.malfunctions!==1?'s':''}</div></div>
      <div class="stat-card"><div class="label">Std Dev</div><div class="value">±${d.stdDev}</div><div class="sub">consistency</div></div>
      <div class="stat-card"><div class="label">Range</div><div class="value">${d.minPts}–${d.maxPts}</div><div class="sub">min / max pts</div></div>
      <div class="stat-card"><div class="label">Driver</div><div class="value">${d.avgDriver}</div>${ratingDots(Math.round(d.avgDriver))}</div>
    </div>`;

  // Match table
  let tableHtml=`<table class="match-table">
    <thead><tr>
      <th>Match</th><th>Total Pts</th><th>Auto</th><th>Tele</th><th>Accuracy</th><th>Status</th><th>Scout Notes</th>
    </tr></thead><tbody>`;
  
  const maxPts = Math.max(...d.matches.map(m=>m.totalPts), 1);
  d.matches.forEach(m=>{
    const barW = Math.round((m.totalPts/100)*80);
    const acc = m.accuracy!==null ? m.accuracy+'%' : '—';
    const disTag = m.disabled ? ' <span style="color:var(--red);font-size:.7rem">●disabled</span>' : '';
    tableHtml+=`<tr>
      <td><strong>${m.match}</strong></td>
      <td><div class="pts-bar-wrap"><div class="pts-bar" style="width:${barW}px"></div><span>${m.totalPts}</span></div></td>
      <td>${m.autoPts}</td>
      <td>${m.telePts}</td>
      <td>${acc}</td>
      <td><span class="state-pill ${stateClass(m.botState)}">${m.botStateText}</span>${disTag}</td>
      <td><div class="comment-text">${m.comment||'—'}</div><div class="scout-tag">Scout: ${m.scoutName}</div></td>
    </tr>`;
  });
  tableHtml+='</tbody></table>';

  const el = document.getElementById('teamDetail');
  el.innerHTML=`
    <div class="team-detail">
      <div class="detail-header">
        <h2>Team ${team}</h2>
        <span class="tier ${tier.cls}" style="font-size:.85rem;padding:4px 10px">${tier.label}</span>
        <span class="trend-badge ${trendCls}">${trendIcon}</span>
        <span style="color:var(--muted);font-size:.85rem">First half avg: ${d.firstHalfAvg} → Second half avg: ${d.secondHalfAvg}</span>
      </div>
      ${statsHtml}
      <div class="two-col">
        <div class="card">
          <h3>📈 Points Per Match</h3>
          <div class="chart-wrap"><canvas id="detailLineChart"></canvas></div>
        </div>
        <div class="card">
          <h3>⚙️ Auto vs Tele Breakdown</h3>
          <div class="chart-wrap"><canvas id="detailBarChart"></canvas></div>
        </div>
      </div>
      <div class="card">
        <h3>📋 Match-by-Match Data</h3>
        ${tableHtml}
      </div>
    </div>`;

  // Charts
  if(_detailChart){ _detailChart.forEach(c=>c&&c.destroy()); }
  _detailChart=[];

  // Line chart
  const lc = document.getElementById('detailLineChart').getContext('2d');
  _detailChart.push(new Chart(lc,{
    type:'line',
    data:{
      labels:d.matches.map(m=>`M${m.match}`),
      datasets:[{
        label:'Total Pts',
        data:d.matches.map(m=>m.totalPts),
        borderColor:'#4f8ef7',
        backgroundColor:'rgba(79,142,247,0.08)',
        pointBackgroundColor:d.matches.map(m=>m.botState===4?'#f43f5e':m.botState===2?'#facc15':'#4f8ef7'),
        pointRadius:6,pointHoverRadius:8,
        borderWidth:2.5,tension:0.3,fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb',callbacks:{label:ctx=>`${ctx.parsed.y} pts`}}},
      scales:{
        x:{ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'}},
        y:{ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:0,max:105,title:{display:true,text:'Pts Contribution',color:'#8b8fa8'}}
      }
    }
  }));

  // Bar chart auto vs tele
  const bc = document.getElementById('detailBarChart').getContext('2d');
  _detailChart.push(new Chart(bc,{
    type:'bar',
    data:{
      labels:d.matches.map(m=>`M${m.match}`),
      datasets:[
        {label:'Auto',data:d.matches.map(m=>m.autoPts),backgroundColor:'rgba(79,142,247,0.85)',borderRadius:4,stack:'s'},
        {label:'Tele',data:d.matches.map(m=>m.telePts),backgroundColor:'rgba(34,211,161,0.7)',borderRadius:4,stack:'s'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9da0b3',boxWidth:10}},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb'}},
      scales:{
        x:{stacked:true,ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'}},
        y:{stacked:true,ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:0,max:110}
      }
    }
  }));
}

// ── COMPARE TAB ──────────────────────────────────────────────────
let _cmpCharts = [];

function buildCompareSelects(){
  const selects=['cmp1','cmp2','cmp3'];
  const defaults=['6328','3467','4909'];
  selects.forEach((id,i)=>{
    const sel=document.getElementById(id);
    ALL_TEAMS.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t; opt.textContent=`Team ${t} (${TEAM_DATA[t].avgTotal} avg)`;
      if(t===defaults[i]) opt.selected=true;
      sel.appendChild(opt);
    });
  });
}

function renderCompare(){
  const teams=[
    document.getElementById('cmp1').value,
    document.getElementById('cmp2').value,
    document.getElementById('cmp3').value,
  ];
  _cmpCharts.forEach(c=>c&&c.destroy());
  _cmpCharts=[];

  const el=document.getElementById('compareCharts');
  el.innerHTML=`
    <div class="compare-grid">
      <div class="full card"><h3>📈 Points Per Match</h3><div class="chart-wrap" style="height:320px"><canvas id="cmpLine"></canvas></div></div>
      <div class="card"><h3>📊 Avg Auto vs Tele</h3><div class="chart-wrap"><canvas id="cmpBar"></canvas></div></div>
      <div class="card"><h3>🎯 Hub Fuel Accuracy</h3><div class="chart-wrap"><canvas id="cmpAcc"></canvas></div></div>
      <div class="card"><h3>🛡️ Ratings Radar</h3><div class="chart-wrap"><canvas id="cmpRadar"></canvas></div></div>
      <div class="card"><h3>📉 Score Range (min / avg / max)</h3><div class="chart-wrap"><canvas id="cmpRange"></canvas></div></div>
    </div>`;

  // ── Line
  const lineCtx=document.getElementById('cmpLine').getContext('2d');
  _cmpCharts.push(new Chart(lineCtx,{
    type:'line',
    data:{datasets:teams.map((t,i)=>({
      label:`Team ${t}`,
      data:TEAM_DATA[t].matches.map(m=>({x:m.match,y:m.totalPts})),
      borderColor:CMP_COLORS[i],
      backgroundColor:`rgba(${hexRgb(CMP_COLORS[i])},0.07)`,
      pointBackgroundColor:CMP_COLORS[i],
      pointRadius:5,pointHoverRadius:7,
      borderWidth:2.5,tension:0.35,fill:false
    }))},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#9da0b3',boxWidth:10}},
        tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb'}
      },
      scales:{
        x:{type:'linear',title:{display:true,text:'Match Number',color:'#8b8fa8'},ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:1,max:42},
        y:{title:{display:true,text:'Pts Contribution',color:'#8b8fa8'},ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:0,max:105}
      }
    }
  }));

  // ── Bar auto/tele
  const barCtx=document.getElementById('cmpBar').getContext('2d');
  _cmpCharts.push(new Chart(barCtx,{
    type:'bar',
    data:{
      labels:teams.map(t=>`Team ${t}`),
      datasets:[
        {label:'Auto Avg',data:teams.map(t=>TEAM_DATA[t].avgAuto),backgroundColor:teams.map((_,i)=>`rgba(${hexRgb(CMP_COLORS[i])},0.9)`),borderRadius:5,barPercentage:0.4,categoryPercentage:0.8},
        {label:'Tele Avg',data:teams.map(t=>TEAM_DATA[t].avgTele),backgroundColor:teams.map((_,i)=>`rgba(${hexRgb(CMP_COLORS[i])},0.3)`),borderColor:teams.map((_,i)=>CMP_COLORS[i]),borderWidth:1.5,borderRadius:5,barPercentage:0.4,categoryPercentage:0.8},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9da0b3',boxWidth:10}},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb'}},
      scales:{
        x:{ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'}},
        y:{ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:0,max:110}
      }
    }
  }));

  // ── Accuracy
  const accCtx=document.getElementById('cmpAcc').getContext('2d');
  const accMin=Math.max(0,Math.min(...teams.map(t=>TEAM_DATA[t].avgAccuracy))-10);
  _cmpCharts.push(new Chart(accCtx,{
    type:'bar',
    data:{
      labels:teams.map(t=>`Team ${t}`),
      datasets:[{label:'Hub Accuracy %',data:teams.map(t=>TEAM_DATA[t].avgAccuracy),backgroundColor:teams.map((_,i)=>`rgba(${hexRgb(CMP_COLORS[i])},0.85)`),borderRadius:5}]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb',callbacks:{label:ctx=>` ${ctx.parsed.x.toFixed(1)}%`}}},
      scales:{
        x:{ticks:{color:'#8b8fa8',callback:v=>v+'%'},grid:{color:'#2a2d3e'},min:accMin,max:101},
        y:{ticks:{color:'#c8cadb'},grid:{color:'#2a2d3e'}}
      }
    }
  }));

  // ── Radar
  const radarCtx=document.getElementById('cmpRadar').getContext('2d');
  function stdDev(arr){const m=arr.reduce((a,b)=>a+b,0)/arr.length;return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length);}
  _cmpCharts.push(new Chart(radarCtx,{
    type:'radar',
    data:{
      labels:['Driver','Fuel Intake','Accuracy','Reliability','Consistency'],
      datasets:teams.map((t,i)=>{
        const d=TEAM_DATA[t];
        const pts=d.matches.map(m=>m.totalPts);
        const consistency=(100-stdDev(pts))/100*4;
        const reliability=(1-d.malfunctions/d.matchCount)*4;
        return {
          label:`Team ${t}`,
          data:[d.avgDriver,d.avgFuel,d.avgAccuracy/25,reliability,Math.max(0,consistency)],
          borderColor:CMP_COLORS[i],
          backgroundColor:`rgba(${hexRgb(CMP_COLORS[i])},0.1)`,
          pointBackgroundColor:CMP_COLORS[i],
          borderWidth:2,pointRadius:4
        };
      })
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9da0b3',boxWidth:10,font:{size:11}}},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb'}},
      scales:{r:{min:0,max:4,ticks:{display:false},pointLabels:{color:'#9da0b3',font:{size:11}},grid:{color:'#2a2d3e'},angleLines:{color:'#2a2d3e'}}}
    }
  }));

  // ── Range chart
  const rangeCtx=document.getElementById('cmpRange').getContext('2d');
  _cmpCharts.push(new Chart(rangeCtx,{
    type:'bar',
    data:{
      labels:teams.map(t=>`Team ${t}`),
      datasets:[
        {label:'Min',data:teams.map(t=>TEAM_DATA[t].minPts),backgroundColor:'transparent',borderColor:'transparent',stack:'r'},
        {label:'Range',data:teams.map(t=>TEAM_DATA[t].maxPts-TEAM_DATA[t].minPts),backgroundColor:teams.map((_,i)=>`rgba(${hexRgb(CMP_COLORS[i])},0.25)`),borderColor:teams.map((_,i)=>CMP_COLORS[i]),borderWidth:1.5,borderRadius:4,stack:'r'},
      ]
    },
    plugins:[{
      id:'avgLines',
      afterDatasetsDraw(chart){
        const{ctx,scales:{x,y}}=chart;
        teams.forEach((t,i)=>{
          const avg=TEAM_DATA[t].avgTotal;
          const xPos=x.getPixelForValue(i);
          const yPos=y.getPixelForValue(avg);
          const bw=x.width/teams.length*0.28;
          ctx.save();ctx.strokeStyle=CMP_COLORS[i];ctx.lineWidth=2.5;ctx.setLineDash([4,2]);
          ctx.beginPath();ctx.moveTo(xPos-bw,yPos);ctx.lineTo(xPos+bw,yPos);ctx.stroke();
          ctx.fillStyle=CMP_COLORS[i];ctx.font='bold 11px Segoe UI';ctx.textAlign='center';
          ctx.fillText(`avg: ${avg}`,xPos,yPos-6);
          ctx.restore();
        });
      }
    }],
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'#2a2d3e',borderWidth:1,titleColor:'#fff',bodyColor:'#c8cadb',
        callbacks:{label:(ctx)=>{
          if(ctx.datasetIndex===1){const t=teams[ctx.dataIndex];return[` Min: ${TEAM_DATA[t].minPts}`,` Max: ${TEAM_DATA[t].maxPts}`,` Avg: ${TEAM_DATA[t].avgTotal}`,` Std Dev: ±${TEAM_DATA[t].stdDev}`];}
          return null;
        }}
      }},
      scales:{
        x:{stacked:true,ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'}},
        y:{stacked:true,ticks:{color:'#8b8fa8'},grid:{color:'#2a2d3e'},min:0,max:110}
      }
    }
  }));
}

// ── TAB SWITCHING ────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['browser','compare'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

// ── INIT ────────────────────────────────────────────────────────
function init() {
  if (typeof Chart === 'undefined') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:16px;color:#8b8fa8;font-family:sans-serif"><div style="font-size:2rem">⚠️</div><div>Chart.js failed to load. Check your internet connection and refresh.</div></div>';
    return;
  }
  buildTeamList();
  buildCompareSelects();
  renderCompare();
  selectTeam(ALL_TEAMS[0]);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</body>
</html>
